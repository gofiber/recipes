name: Sync docs

on:
  push:
    branches: [main, master]
    paths: ['**/*.md']
  workflow_dispatch:

jobs:
  sync:
    uses: gofiber/.github/.github/workflows/sync-docs.yml@main
    with:
      destination-dir: docs/recipes
      file-patterns: '*.md,*.png,*.jpg,*.jpeg,*.gif,*.bmp,*.svg,*.webp'
      exclude-patterns: vendor,.github
      commit-url: https://github.com/gofiber/recipes
      event-mode: push
    secrets:
      doc-sync-token: ${{ secrets.DOC_SYNC_TOKEN }}
